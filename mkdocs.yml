site_name: Wiki IMCR
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.lin
    - content.code.annotation
    - content.code. copy

  language: en

  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple

    - scheme: slate
      tobble:
        icon: material/toggle-switch
        name: switch to light mode
      primary: teal
      accent: lime
